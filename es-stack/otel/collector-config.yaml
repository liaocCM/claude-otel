# OpenTelemetry Collector config — receives OTLP from Claude Code and ships
# everything to Elasticsearch using the native OTel mapping mode (data streams:
# logs-*.otel-*, metrics-*.otel-*, traces-*.otel-*).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Small batches + short timeout so the demo feels live.
  batch:
    timeout: 5s
    send_batch_size: 1024
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false
  # Force every signal to dataset=claude_code (underscore — matches Claude Code's
  # native emission for some events, and Elastic's dataset naming convention).
  # Without this, tool_result/tool_decision events sometimes leak to
  # `*-generic.otel-default`, missing our custom mappings.
  resource/dataset:
    attributes:
      - key: data_stream.dataset
        value: claude_code
        action: upsert
  # ES exporter quirk: for logs/traces it reads data_stream.dataset from
  # RECORD/SPAN attributes, not Resource. Copy it down onto every record/span.
  attributes/dataset:
    actions:
      - key: data_stream.dataset
        value: claude_code
        action: upsert

exporters:
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    mapping:
      mode: otel
    flush:
      interval: 5s
    retry:
      enabled: true
      max_retries: 5
  # Fan traces out to Jaeger as well — Kibana for aggregates, Jaeger for the
  # per-trace waterfall view. Same collector, two destinations.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Mirror everything to collector stdout — handy for `docker logs`.
  debug:
    verbosity: normal

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, resource/dataset, attributes/dataset, batch]
      exporters: [elasticsearch, debug]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, resource/dataset, attributes/dataset, batch]
      exporters: [elasticsearch, debug]
    traces:
      receivers: [otlp]
      processors: [resourcedetection, resource/dataset, attributes/dataset, batch]
      exporters: [elasticsearch, otlp/jaeger, debug]
