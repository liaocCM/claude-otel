# Fans OTLP signals out to Tempo / Loki / Prometheus.

receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false
  # Claude Code emits DELTA temporality; Prometheus only accepts CUMULATIVE.
  # This processor converts on the fly. (Tempo/Loki don't care.)
  deltatocumulative:
    max_stale: 5m

exporters:
  # Traces → Tempo (its OTLP receiver on :4317)
  otlp/tempo:
    endpoint: tempo:4317
    tls: { insecure: true }
  # Logs → Loki (OTLP HTTP receiver on :3100/otlp/v1/logs).
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  # Metrics → Prometheus (its OTLP receiver, enabled by --web.enable-otlp-receiver)
  otlphttp/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
  debug:
    verbosity: normal

service:
  telemetry:
    logs: { level: info }
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [otlp/tempo, debug]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [otlphttp/loki, debug]
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, deltatocumulative, batch]
      exporters: [otlphttp/prometheus, debug]
