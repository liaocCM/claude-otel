global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Make resource attrs (service.name etc.) usable as labels when OTel metrics
# arrive via the OTLP receiver.
otlp:
  promote_resource_attributes:
    - service.name
    - service.namespace
    - service.instance.id
    - deployment.environment
    - host.name
    - telemetry.sdk.language

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
