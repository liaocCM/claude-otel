apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    jsonData:
      # Jump from a trace span → logs at that time/service (the LGTM USP)
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        tags:
          - { key: 'service.name', value: 'service_name' }
        filterByTraceID: true
        filterBySpanID: false
      # Jump from a trace → related metrics
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '-2m'
        spanEndTimeShift: '2m'
        tags:
          - { key: 'service.name', value: 'service_name' }
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    jsonData:
      # Auto-detect trace IDs in log lines and offer a link to open the trace
      derivedFields:
        - matcherRegex: '(?:trace[_-]?id|traceID)["=:\s]+([0-9a-f]{32})'
          name: TraceID
          datasourceUid: tempo
          url: '$${__value.raw}'
          urlDisplayLabel: 'Open trace'

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    jsonData:
      # Exemplar links: from a metric data point, click → open the related trace
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
